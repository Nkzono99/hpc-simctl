[campaign]
name = "density-dependence-surface-charging"
description = "プラズマ密度が宇宙機表面帯電に与える影響を定量評価"
hypothesis = "電子密度 10^12 m^-3 以上で表面電位が飽和する"
simulator = "beach"

[variables]
"particles.species.0.number_density_cm3" = { role = "independent", range = [1.0, 100.0], unit = "cm^-3", reason = "電子密度の走査" }
"sim.batch_count" = { role = "independent", values = [100, 500], reason = "収束確認のためバッチ数も変化" }
"sim.dt" = { role = "fixed", values = [2.0e-8], unit = "s", reason = "プラズマ周波数に対して十分小さい" }
"sim.field_solver" = { role = "fixed", values = ["fmm"], reason = "FMM が最も効率的" }

[observables]
surface_charge = { source = "work/outputs/charges.csv", description = "最終的な表面電荷分布" }
charge_history = { source = "work/outputs/charge_history.csv", description = "電荷蓄積の時間発展" }
potential_history = { source = "work/outputs/potential_history.csv", description = "電位の時間発展" }
