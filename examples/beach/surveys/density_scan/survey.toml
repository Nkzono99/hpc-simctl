[survey]
id = "S20260328-density"
name = "Electron density scan"
base_case = "periodic2_basic"
simulator = "beach"
launcher = "srun"

[classification]
model = "surface_charging"
submodel = "density_scan"
tags = ["fmm", "periodic", "density"]

# Parameter axes: 4 density values x 2 batch counts = 8 runs.
# Keys use dot-notation to target nested TOML keys in beach.toml.
[axes]
"sim.batch_count" = [100, 500]
"particles.species.0.number_density_cm3" = [1.0, 5.0, 10.0, 50.0]

[naming]
# Template uses leaf key names (after last dot).
display_name = "n{number_density_cm3}_batches{batch_count}"

[job]
partition = "gr10451a"
nodes = 1
ntasks = 6
walltime = "120:00:00"
