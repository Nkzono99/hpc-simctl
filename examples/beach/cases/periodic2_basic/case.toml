[case]
name = "periodic2_basic"
simulator = "beach"
launcher = "srun"
description = "Periodic-2 FMM basic case with solar wind electrons and ions"

[classification]
model = "surface_charging"
submodel = "periodic2"
tags = ["fmm", "periodic", "solarwind"]

[job]
partition = "gr10451a"
nodes = 1
ntasks = 6
walltime = "120:00:00"

# Parameters that override beach.toml values via dot-notation.
[params]
"sim.dt" = 2.0e-8
"sim.batch_count" = 100
"sim.max_step" = 10000
"sim.field_solver" = "fmm"
"sim.field_bc_mode" = "periodic2"
"sim.use_box" = true
"sim.rng_seed" = 12345
