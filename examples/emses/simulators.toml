[simulators.emses]
adapter = "emses"
resolver_mode = "local_executable"

# Point to your compiled mpiemses3D binary.
# For local_executable mode, this should be an absolute path.
executable = "/path/to/mpiemses3D"

# For local_source mode (builds from source):
# resolver_mode = "local_source"
# source_repo = "/path/to/EMSES"
# build_command = "make -j"
# executable = "mpiemses3D"
