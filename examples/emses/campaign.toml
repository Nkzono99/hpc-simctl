[campaign]
name = "magnetic-angle-dependence"
description = "磁場角度がプラズマ-表面相互作用に与える影響を調査"
hypothesis = "磁力線入射角 45 度付近でイオンフラックスが最大になる"
simulator = "emses"

[variables]
"plasma.wc" = { role = "independent", range = [0.0, 0.5], unit = "omega_pe", reason = "サイクロトロン周波数を変化させて磁場強度依存性を調べる" }
"plasma.phiz" = { role = "independent", range = [0.0, 90.0], unit = "deg", reason = "磁力線入射角の走査" }
"tmgrid.dt" = { role = "fixed", values = [1.0], unit = "1/omega_pe", reason = "CFL 条件を満たす値" }
"tmgrid.nx" = { role = "fixed", values = [64], reason = "計算コストとの兼ね合い" }
"jobcon.nstep" = { role = "fixed", values = [50000], reason = "定常状態に達するのに十分なステップ数" }

[observables]
ion_flux = { source = "work/influx", column = 1, description = "表面へのイオンフラックス", unit = "normalized" }
electron_flux = { source = "work/influx", column = 2, description = "表面への電子フラックス", unit = "normalized" }
surface_potential = { source = "work/volt", column = 1, description = "表面電位", unit = "normalized" }
total_energy = { source = "work/energy", column = 1, description = "系の全エネルギー（収束確認用）", unit = "normalized" }
