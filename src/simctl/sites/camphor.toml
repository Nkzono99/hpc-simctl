# Camphor (Fujitsu PRIMEHPC / camphor3)
# https://web.kudpc.kyoto-u.ac.jp/manual/ja

[site]
name = "camphor"
resource_style = "rsc"
modules = [
    "intel/2023.2",
    "intelmpi/2023.2",
]
stdout = "stdout.%J.log"
stderr = "stderr.%J.log"

[site.simulators.emses]
modules = [
    "hdf5/1.12.2_intel-2023.2-impi",
    "fftw/3.3.10_intel-2022.3-impi",
]

[site.simulators.beach]
# No additional modules needed

# Launcher defaults for this site.
# Copied into launchers.toml during `simctl init`.
[launcher]
type = "srun"
use_slurm_ntasks = true
